server:
  port: 8081

spring:
  application:
    name: auth-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/campus_trade

jwt:
  secret: campusTradeSecretKeyCampusTradeSecretKey123456
  access-token-expiration: 900

auth:
  refresh-token:
    expiration: 1209600
  cookie:
    name: refreshToken
    path: /auth
    same-site: Lax
    secure: false
    max-age: 1209600

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://localhost:5173
      - http://127.0.0.1:5173
